name: Deploy Vite (Lovable) to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Try Bun first (Lovable projects often use it)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies (Bun)
        run: bun install || npm install --legacy-peer-deps

      - name: Build project (Bun or npm)
        run: bun run build || npm run build

      # Fallback check: ensure dist exists
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist folder not found"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
