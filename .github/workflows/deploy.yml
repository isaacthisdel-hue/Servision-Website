name: Deploy Lovable App (FIXED ROOT STRUCTURE)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install || npm install --legacy-peer-deps

      - name: Build project
        run: bun run build || npm run build

      # 🔥 CRITICAL FIX: flatten output so index.html is ROOT
      - name: Prepare correct GitHub Pages structure
        run: |
          mkdir site

          if [ -d ".output/public" ]; then
            echo "Using .output/public"
            cp -r .output/public/* site/

          elif [ -d "dist" ]; then
            echo "Using dist"
            cp -r dist/* site/

          elif [ -d "build" ]; then
            echo "Using build"
            cp -r build/* site/

          else
            echo "❌ No valid build folder found"
            exit 1
          fi

          echo "Final site structure:"
          ls -la site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
