name: Deploy Lovable App (Bun First) to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🧠 IMPORTANT: your project has bun.lock → must use Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies (Bun)
        run: bun install || npm install --legacy-peer-deps

      - name: Build project (Bun or fallback)
        run: bun run build || npm run build

      - name: Debug output
        run: |
          echo "=== ROOT FILES ==="
          ls -la

          echo "=== .output ==="
          ls -la .output || true

          echo "=== .output/public ==="
          ls -la .output/public || true

      - name: Prepare site folder
        run: |
          if [ -d ".output/public" ]; then
            echo "Using .output/public"
            cp -r .output/public site

          elif [ -d "dist" ]; then
            echo "Using dist"
            cp -r dist site

          elif [ -d "build" ]; then
            echo "Using build"
            cp -r build site

          else
            echo "❌ No output folder found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
