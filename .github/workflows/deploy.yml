name: Deploy Lovable App (Auto Detect Output) to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Detect correct output folder
        run: |
          echo "Searching for output..."

          if [ -d ".output/public" ]; then
            echo "FOUND: .output/public"
            cp -r .output/public site

          elif [ -d ".output" ]; then
            echo "FOUND: .output"
            cp -r .output site

          elif [ -d "dist" ]; then
            echo "FOUND: dist"
            cp -r dist site

          elif [ -d "build" ]; then
            echo "FOUND: build"
            cp -r build site

          else
            echo "❌ No valid output folder found"
            ls -la
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
